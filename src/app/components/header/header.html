<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row md:items-center justify-between gap-3 md:gap-6">
    
    <div class="flex items-center justify-between w-full md:w-auto shrink-0">
      <a routerLink="/" class="text-2xl font-black text-vitrina-green">
        Vitrina<span class="text-gray-800">Victoria</span>
      </a>
      
      </div>

    <div class="flex-1 w-full max-w-xl">
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
        <input type="text" #searchInput (keyup.enter)="buscar(searchInput.value)" 
               placeholder="Buscar productos, tiendas..." 
               class="block w-full pl-10 pr-3 py-2.5 md:py-2 border border-gray-200 rounded-xl leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-vitrina-green focus:border-transparent transition-colors text-sm shadow-inner">
      </div>
    </div>

    <div class="hidden md:block shrink-0 w-24">
      </div>
    
  </div>
</header>
