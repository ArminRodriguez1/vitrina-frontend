<div class="h-full flex flex-col bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden relative cursor-pointer hover:shadow-md transition-shadow">
  
  @if (producto.stock > 0) {
    <div class="absolute top-3 left-3 bg-vitrina-green text-white text-xs font-bold px-2 py-1 rounded-md z-10">
      Disponible
    </div>
  } @else {
    <div class="absolute inset-0 bg-white/60 backdrop-blur-[2px] z-20 flex items-center justify-center">
      <span class="text-gray-500 font-medium font-bold text-lg">Agotado</span>
    </div>
  }

  <img [src]="producto.image || 'https://via.placeholder.com/500x500?text=Sin+Imagen'" 
       [alt]="producto.title" 
       loading="lazy"
       class="w-full h-48 object-cover shrink-0" />

  <div class="p-4 flex flex-col flex-grow">
    @if (producto.category_name) {
      <span class="text-[10px] font-bold text-vitrina-green uppercase tracking-wider mb-1 block">
        {{ producto.category_name }}
      </span>
    }

    <h3 class="font-bold text-gray-800 line-clamp-2" [title]="producto.title">{{ producto.title }}</h3>
    
    <p class="text-xs text-gray-500 mt-1 mb-3 line-clamp-2">{{ producto.description }}</p>
    
    <div class="flex justify-between items-center mt-auto">
  @if (producto.store_show_prices) {
    <span class="font-bold text-vitrina-green text-lg">{{ producto.price | currency:'CLP':'symbol-narrow':'1.0-0' }}</span>
  } @else {
    <span class="font-bold text-gray-400 text-sm italic">Consultar precio</span>
  }
  <span class="text-gray-400">›</span>
</div>
  </div>
</div>
